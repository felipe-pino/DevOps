name: CI/CD Tienda Perritos - DB

on:
  push:
    branches: [ "main" ]
    paths:
      - "db/**"

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4        # ← actualizado de v3 a v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr                    # ← id necesario para usar outputs
        uses: aws-actions/amazon-ecr-login@v2   # ← actualizado de v1 a v2

      - name: Build & Push imagen DB a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}   # ← URL real del login
        run: |
          cd db
          docker build -t $ECR_REGISTRY/tienda-db:latest .
          docker push $ECR_REGISTRY/tienda-db:latest

      - name: Desplegar DB en EC2 vía SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_DB_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-db desde ECR" \
            --parameters commands='[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_DB }}:latest",
              "docker stop tienda-db || true",
              "docker rm tienda-db || true",
              "docker run -d --name tienda-db -p 3306:3306 -v dbdata:/var/lib/mysql ${{ secrets.ECR_REPO_URL_DB }}:latest"
            ]' \
            --region "${{ secrets.AWS_REGION }}"
