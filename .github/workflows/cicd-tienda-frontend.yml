name: CI/CD Tienda Perritos - Frontend
 
on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
 
jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4        # ← actualizado de v3 a v4
 
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      - name: Login en Amazon ECR
        id: login-ecr                    # ← id necesario para usar outputs
        uses: aws-actions/amazon-ecr-login@v2   # ← actualizado de v1 a v2
 
      - name: Build & Push imagen Frontend a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}   # ← toma la URL real del login
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/tienda-frontend:latest .
          docker push $ECR_REGISTRY/tienda-frontend:latest
 
      - name: Desplegar Frontend en EC2 vía SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-frontend desde ECR" \
            --parameters commands='[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop tienda-frontend || true",
              "docker rm tienda-frontend || true",
              "docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
            ]' \
            --region "${{ secrets.AWS_REGION }}"
